<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 40px;
        }

        p {
            font-size: 18px;
            color: #cbd5f5;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #22c55e;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Welcome to My Website</h1>
        <p>This site is hosted on Railway</p>

        <button onclick="showMessage()">Click Me</button>
    </div>

    <script>
        function showMessage() {
            alert("Hello! Your site is working 🎉");
        }
    </script>

</body>
</html>
