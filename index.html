<!DOCTYPE html>
<html>
<head>
<title>Legend Login</title>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:300px;
  text-align:center;
}

input{
  width:90%;
  padding:10px;
  margin:8px;
  border:none;
  border-radius:6px;
}

button{
  width:95%;
  padding:10px;
  background:#22c55e;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}
</style>

</head>

<body>

<div class="box">
  <h2>Login System</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<script>
async function signup(){
  const res = await fetch("/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();
  msg.innerText = data.msg;

  console.log(data.msg);
}

async function login(){
  const res = await fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();
  msg.innerText = data.msg;

  console.log(data.msg);

  if(data.token){
    localStorage.setItem("token",data.token);
    setTimeout(()=>{
      window.location.href = "/dashboard.html";
    },1000);
  }
}
</script>

</body>
</html>
